<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故事串聯大師 - 專業訓練系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            overscroll-behavior-y: contain; /* 防止下拉刷新影響操作 */
        }

        /* 拖曳排序樣式 */
        .item-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            cursor: grab;
            touch-action: none; /* 禁用預設觸控動作以利拖曳 */
        }

        .item-card:active {
            cursor: grabbing;
        }

        .item-card.dragging {
            opacity: 0.5;
            transform: scale(1.05);
            border-color: #6366f1;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .xp-bar-fill {
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .brain-badge {
            background: linear-gradient(135deg, #e0e7ff 0%, #eef2ff 100%);
            border: 1px solid #c7d2fe;
            font-size: 0.7rem;
        }

        /* 歷史紀錄摺疊動畫 */
        .history-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
        }

        .history-content.expanded {
            max-height: 2000px;
        }

        /* 滾動條美化 */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        @media (max-width: 640px) {
            .item-card {
                width: 5rem !important;
                padding: 0.75rem !important;
            }
            .item-card .text-4xl {
                font-size: 1.875rem !important;
            }
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Top Navigation -->
    <nav class="sticky top-0 z-40 bg-white/95 backdrop-blur-md border-b border-slate-200 px-4 py-3">
        <div class="max-w-6xl mx-auto flex items-center justify-between gap-2">
            <div class="flex items-center space-x-2 md:space-x-3">
                <div class="bg-indigo-700 text-white p-2 rounded-xl shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 md:h-6 md:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <div class="overflow-hidden">
                    <h1 class="font-black text-slate-800 tracking-tight text-sm md:text-lg truncate">故事串聯大師 <span class="text-indigo-600 font-bold italic">PRO</span></h1>
                    <div class="hidden xs:block text-[8px] md:text-[10px] text-slate-400 font-bold uppercase tracking-widest leading-none">Cognitive Neuro-Rehabilitation</div>
                </div>
            </div>

            <div class="flex items-center space-x-2 md:space-x-4">
                <div class="hidden sm:flex flex-col items-end mr-2 border-r border-slate-200 pr-3">
                    <div class="text-[9px] text-slate-500 font-black uppercase mb-1">等級：<span id="user-level" class="text-indigo-600">1</span></div>
                    <div class="w-20 md:w-28 h-1 bg-slate-100 rounded-full overflow-hidden">
                        <div id="xp-fill" class="xp-bar-fill h-full bg-indigo-600 w-0"></div>
                    </div>
                </div>
                
                <div class="flex bg-slate-100 p-0.5 md:p-1 rounded-lg border border-slate-200">
                    <button onclick="changeStage(1)" id="btn-stage-1" class="px-2 py-1 md:px-4 md:py-1.5 rounded-md text-[10px] md:text-xs font-bold transition-all">階段 1</button>
                    <button onclick="changeStage(2)" id="btn-stage-2" class="px-2 py-1 md:px-4 md:py-1.5 rounded-md text-[10px] md:text-xs font-bold transition-all">階段 2</button>
                    <button onclick="changeStage(3)" id="btn-stage-3" class="px-2 py-1 md:px-4 md:py-1.5 rounded-md text-[10px] md:text-xs font-bold transition-all">階段 3</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-6 md:py-10">
        
        <!-- Professional Header -->
        <section class="grid grid-cols-1 md:grid-cols-12 gap-6 mb-8">
            <div class="md:col-span-8">
                <h2 id="stage-title" class="text-xl md:text-2xl font-black text-slate-800 mb-2 tracking-tight">載入訓練階段...</h2>
                <div class="flex flex-wrap gap-1.5 mb-3" id="brain-regions-container"></div>
                <p id="stage-desc" class="text-slate-500 leading-relaxed font-medium text-xs md:text-sm"></p>
            </div>
            
            <div class="md:col-span-4 flex flex-col justify-center">
                <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">目標數量</span>
                        <span id="count-display" class="text-indigo-700 font-black text-sm">2</span>
                    </div>
                    <input type="range" id="item-count-slider" min="2" max="10" value="2" 
                        class="w-full h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                </div>
            </div>
        </section>

        <!-- Training Board -->
        <div class="bg-white border border-slate-200 rounded-[2rem] p-5 md:p-10 shadow-sm relative">
            <div class="flex items-center justify-center space-x-2 mb-8 text-[9px] md:text-[11px] font-bold text-slate-400 uppercase tracking-[0.2em]">
                <span>拖曳物件調整順序</span>
            </div>

            <!-- Items Container -->
            <div id="items-board" class="flex flex-wrap items-center justify-center gap-3 md:gap-4 min-h-[140px]">
                <!-- Item cards will be rendered here -->
            </div>

            <!-- Input Area -->
            <div class="mt-8 max-w-2xl mx-auto">
                <textarea id="story-input" 
                    class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 md:p-6 text-base md:text-lg focus:bg-white focus:border-indigo-500 focus:outline-none transition-all resize-none min-h-[160px] leading-relaxed shadow-inner"
                    placeholder="請根據排列順序編寫故事內容..."></textarea>
                
                <div class="flex flex-col sm:flex-row gap-3 mt-6">
                    <button onclick="reshuffleItems()" class="px-6 py-3 bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 text-sm font-bold rounded-xl transition-all">
                        🔄 更新詞彙
                    </button>
                    <button id="submit-btn" class="flex-1 px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-black rounded-xl shadow-lg transition-all active:scale-[0.98] flex items-center justify-center space-x-2">
                        <span>完成內容並提交</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Collapsible History -->
        <section class="mt-12 bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
            <button onclick="toggleHistory()" class="w-full px-6 py-4 flex items-center justify-between hover:bg-slate-50 transition-colors">
                <div class="flex items-center space-x-3">
                    <div class="h-6 w-1 bg-indigo-600 rounded-full"></div>
                    <h3 class="text-sm md:text-base font-black text-slate-800 tracking-tight">檢視專業訓練紀錄</h3>
                </div>
                <svg id="history-arrow" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>
            <div id="history-content" class="history-content bg-slate-50/30">
                <div id="history-list" class="p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="col-span-full py-10 text-center text-slate-400 text-xs font-bold uppercase tracking-widest italic">
                        尚無訓練存檔數據
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Overlay Feedback -->
    <div id="success-overlay" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4">
        <div class="bg-white rounded-[2.5rem] shadow-2xl p-8 max-w-xs w-full text-center transform transition-all duration-300 scale-95 opacity-0" id="modal-content">
            <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-inner">✓</div>
            <h4 class="text-xl font-black text-slate-800 mb-2">訓練建構完成</h4>
            <p class="text-slate-500 mb-6 leading-relaxed font-medium text-xs">大腦神經編碼與時序固化練習已同步更新至紀錄中。</p>
            <button onclick="closeSuccess()" class="w-full py-3.5 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 transition-all shadow-lg active:scale-95">確認並繼續</button>
        </div>
    </div>

    <script>
        const ITEMS_POOL = [
            { name: "鑰匙", icon: "🔑" }, { name: "麵包", icon: "🍞" }, { name: "牙刷", icon: "🪥" }, { name: "拖鞋", icon: "🩴" },
            { name: "雨傘", icon: "☂️" }, { name: "梳子", icon: "🪮" }, { name: "眼鏡", icon: "👓" }, { name: "指甲剪", icon: "✂️" },
            { name: "香水", icon: "🧴" }, { name: "吹風機", icon: "💨" }, { name: "毛巾", icon: "🧣" }, { name: "鏡子", icon: "🪞" },
            { name: "鬧鐘", icon: "⏰" }, { name: "充電線", icon: "🔌" }, { name: "遙控器", icon: "📺" }, { name: "垃圾桶", icon: "🗑️" },
            { name: "衛生紙", icon: "🧻" }, { name: "襪子", icon: "🧦" }, { name: "衣架", icon: "🧥" }, { name: "枕頭", icon: "🛌" },
            { name: "手電筒", icon: "🔦" }, { name: "口罩", icon: "😷" }, { name: "帽子", icon: "🧢" }, { name: "錢包", icon: "👛" },
            { name: "體重計", icon: "⚖️" }, { name: "刮鬍刀", icon: "🪒" }, { name: "肥皂", icon: "🧼" }, { name: "水壺", icon: "🍶" },
            { name: "咖啡", icon: "☕" }, { name: "漢堡", icon: "🍔" }, { name: "蘋果", icon: "🍎" }, { name: "香蕉", icon: "🍌" },
            { name: "西瓜", icon: "🍉" }, { name: "草莓", icon: "🍓" }, { name: "巧克力", icon: "🍫" }, { name: "牛奶", icon: "🥛" },
            { name: "壽司", icon: "🍣" }, { name: "披薩", icon: "🍕" }, { name: "雞蛋", icon: "🥚" }, { name: "冰淇淋", icon: "🍦" },
            { name: "拉麵", icon: "🍜" }, { name: "甜甜圈", icon: "🍩" }, { name: "蛋糕", icon: "🍰" }, { name: "水蜜桃", icon: "🍑" },
            { name: "飯糰", icon: "🍙" }, { name: "火車", icon: "🚆" }, { name: "地圖", icon: "🗺️" }, { name: "電腦", icon: "💻" },
            { name: "手機", icon: "📱" }, { name: "書本", icon: "📖" }, { name: "蝴蝶", icon: "🦋" }, { name: "太陽", icon: "☀️" },
            { name: "彩虹", icon: "🌈" }, { name: "月亮", icon: "🌙" }, { name: "小狗", icon: "🐶" }, { name: "拼圖", icon: "🧩" }
        ];

        let state = {
            currentStage: 1,
            itemCount: 2,
            items: [],
            xp: 0,
            level: 1,
            history: [],
            draggedIndex: null,
            startTime: 0
        };

        window.onload = () => {
            initUI();
            changeStage(1);
        };

        function initUI() {
            const slider = document.getElementById('item-count-slider');
            slider.oninput = (e) => {
                state.itemCount = parseInt(e.target.value);
                document.getElementById('count-display').innerText = state.itemCount;
                reshuffleItems();
            };
            document.getElementById('submit-btn').onclick = handleSubmit;
        }

        function toggleHistory() {
            const content = document.getElementById('history-content');
            const arrow = document.getElementById('history-arrow');
            content.classList.toggle('expanded');
            arrow.classList.toggle('rotate-180');
        }

        function changeStage(stage) {
            state.currentStage = stage;
            state.itemCount = [0, 2, 3, 4][stage];
            document.getElementById('item-count-slider').value = state.itemCount;
            document.getElementById('count-display').innerText = state.itemCount;

            const config = {
                1: { title: "階段 1：基礎語義編碼訓練", desc: "強化『前額葉』工作記憶與『視覺心像』。利用一個明確動作將詞彙鎖定。", brains: ["前額葉皮質", "枕葉/顳葉"] },
                2: { title: "階段 2：海馬迴時序固化", desc: "活化『海馬迴』陳述性記憶。建立嚴謹因果關係腳本，模擬新資訊固化過程。", brains: ["海馬迴", "前額葉執行功能"] },
                3: { title: "階段 3：自我參考效應", desc: "利用『自我生成效應』。將個案納入故事核心，大幅提升提取路徑的穩固性。", brains: ["前額葉自我參考", "海馬迴深度提取"] }
            };

            document.getElementById('stage-title').innerText = config[stage].title;
            document.getElementById('stage-desc').innerText = config[stage].desc;
            document.getElementById('brain-regions-container').innerHTML = config[stage].brains.map(b => 
                `<span class="brain-badge px-2 py-0.5 rounded-full font-black text-indigo-700 tracking-tighter uppercase">${b}</span>`
            ).join('');

            [1, 2, 3].forEach(i => {
                const btn = document.getElementById(`btn-stage-${i}`);
                btn.className = (i === stage) 
                    ? "px-3 py-1 md:px-4 md:py-1.5 rounded-md text-[10px] md:text-xs font-bold transition-all bg-white shadow-sm text-indigo-700 border border-slate-200"
                    : "px-3 py-1 md:px-4 md:py-1.5 rounded-md text-[10px] md:text-xs font-bold transition-all text-slate-400 hover:text-slate-600";
            });

            reshuffleItems();
        }

        function reshuffleItems() {
            const shuffled = [...ITEMS_POOL].sort(() => 0.5 - Math.random());
            state.items = shuffled.slice(0, state.itemCount);
            state.startTime = Date.now(); // 隱形計時器開始
            renderBoard();
            document.getElementById('story-input').value = "";
        }

        function renderBoard() {
            const board = document.getElementById('items-board');
            board.innerHTML = '';
            
            state.items.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = "item-card relative bg-white border border-slate-200 rounded-2xl p-4 w-24 md:w-32 flex flex-col items-center shadow-sm";
                card.draggable = true;
                card.dataset.index = idx;
                
                // 拖曳事件 (支援電腦)
                card.addEventListener('dragstart', e => { state.draggedIndex = idx; card.classList.add('dragging'); });
                card.addEventListener('dragover', e => e.preventDefault());
                card.addEventListener('drop', e => {
                    const targetIdx = parseInt(card.dataset.index);
                    const items = [...state.items];
                    const movedItem = items.splice(state.draggedIndex, 1)[0];
                    items.splice(targetIdx, 0, movedItem);
                    state.items = items;
                    renderBoard();
                });
                card.addEventListener('dragend', () => card.classList.remove('dragging'));

                card.innerHTML = `
                    <div class="text-[8px] font-black text-slate-300 absolute top-2 left-0 right-0 text-center uppercase tracking-widest">${idx + 1}</div>
                    <div class="text-3xl md:text-4xl mt-1 mb-2 pointer-events-none">${item.icon}</div>
                    <div class="font-bold text-slate-800 text-[10px] md:text-sm tracking-tight pointer-events-none text-center">${item.name}</div>
                `;
                board.appendChild(card);
            });
        }

        function handleSubmit() {
            const val = document.getElementById('story-input').value.trim();
            if (val.length < 5) return showToast("內容深度不足。");
            if (state.currentStage === 3 && !(val.includes("我") || val.includes("自己"))) return showToast("需納入『自我』參考點。");

            // 計算耗時 (隱形計時)
            const durationMs = Date.now() - state.startTime;
            const mins = Math.floor(durationMs / 60000).toString().padStart(2, '0');
            const secs = Math.floor((durationMs % 60000) / 1000).toString().padStart(2, '0');
            const finalTime = `${mins}:${secs}`;

            // XP 邏輯
            state.xp += 25;
            if (state.xp >= 100) { state.level++; state.xp %= 100; }

            const record = {
                stage: state.currentStage,
                items: state.items.map(i => i.name).join(' → '),
                text: val,
                duration: finalTime,
                timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };
            state.history.unshift(record);

            updateStats();
            renderHistory();
            showSuccess();
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.7 } });
        }

        function updateStats() {
            document.getElementById('user-level').innerText = state.level;
            document.getElementById('xp-fill').style.width = `${state.xp}%`;
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = state.history.map(item => `
                <div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm border-l-4 border-l-indigo-500">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[8px] font-black uppercase text-indigo-500 tracking-wider">階段 ${item.stage} </span>
                        <div class="flex items-center space-x-2">
                            <span class="text-[9px] font-black bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded">耗時 ${item.duration}</span>
                            <span class="text-[8px] text-slate-400 font-bold uppercase">${item.timestamp}</span>
                        </div>
                    </div>
                    <div class="text-[10px] font-bold text-slate-500 mb-2">${item.items}</div>
                    <p class="text-xs text-slate-700 leading-relaxed">${item.text}</p>
                </div>
            `).join('');
        }

        function showSuccess() {
            const overlay = document.getElementById('success-overlay');
            const content = document.getElementById('modal-content');
            overlay.classList.remove('hidden');
            setTimeout(() => { content.classList.remove('scale-95', 'opacity-0'); content.classList.add('scale-100', 'opacity-100'); }, 10);
        }

        function closeSuccess() {
            const content = document.getElementById('modal-content');
            content.classList.replace('scale-100', 'scale-95'); content.classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => { document.getElementById('success-overlay').classList.add('hidden'); reshuffleItems(); }, 300);
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = "fixed top-20 left-1/2 -translate-x-1/2 z-[100] bg-slate-800 text-white px-6 py-2 rounded-full shadow-2xl font-bold text-[10px] animate-bounce";
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }
    </script>
</body>
</html>
